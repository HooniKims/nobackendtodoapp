            overflow-x: hidden;

        .neo-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }

        .neo-shadow-lg {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }

        .neo-button {
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.1s;
        }

        .neo-button:active {
            transform: translate(4px, 4px) !important;
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1) !important;
        }

        .neo-button:hover {
            transform: scale(1.05) translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
        }

        .task-pop {
            animation: taskPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform-origin: center;
        }

        @media (prefers-reduced-motion: reduce) {
            .task-pop {
                animation: none;
            }
            .screen-shake {
                animation: none;
            }
            .wiggle {
                animation: none;
            }
            .bg-shape-inner {
                animation: none !important;
            }
        }

        @keyframes taskPop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .wiggle {
            animation: wiggle 2s linear infinite;
        }

        @keyframes wiggle {
            0%, 7% { transform: rotateZ(0); }
            15% { transform: rotateZ(-5deg); }
            20% { transform: rotateZ(3deg); }
            25% { transform: rotateZ(-5deg); }
            30% { transform: rotateZ(2deg); }
            35%, 100% { transform: rotateZ(0); }
        }

        .screen-shake {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .checkbox-container input:checked + div {
            background-color: theme('colors.primary-container');
            animation: taskPop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .checkbox-container input:checked + div svg {

        }

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Manage Refresh Count
            let refreshCount = localStorage.getItem('todo_refresh_count') || 0;
            refreshCount = parseInt(refreshCount) + 1;
            localStorage.setItem('todo_refresh_count', refreshCount);
            
            const refreshBtnText = document.getElementById('refresh-btn-text');
            if (refreshBtnText) {
                refreshBtnText.textContent = `새로고침: ${refreshCount}회`;
            }

            // Session Reset button
            const resetBtn = document.getElementById('reset-session-btn');
            if (resetBtn) {
                resetBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('todo_refresh_count');
                    location.reload();
                });
            }

            // --- HTML5 Canvas 3D Spacecraft Engine (Cosmic Abyss Travel & 2D Mouse Trail) ---
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            
            let particles = [];
            let planets = [];
            let shootingStars = [];
            let trailParticles = [];
            
            const particleCount = 200;
            const planetCount = 5; 
            
            // Nebula shifting colors dynamic values
            let currentNebulaHue1 = 0;
            let currentNebulaHue2 = 140;
            
            // 3D Engine Constants (Constant calm speed towards the deep abyss)
            const focalLength = 240; 
            const flightSpeed = 1.2; 
            
            let currentMouseX = window.innerWidth / 2;
            let currentMouseY = window.innerHeight / 2;
            let lastMouseX = window.innerWidth / 2;
            let lastMouseY = window.innerHeight / 2;
            let mouseActive = false;
            
            let trailHue = 0;
            const trailThreshold = 4;
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initParticles();
                initPlanets();
                shootingStars = [];
                trailParticles = [];
            }
            
            class Planet3D {
                constructor(zInit = null, type = null) {
                    this.init(zInit, type);
                }
                
                init(zInit = null, type = null) {
                    // Spread planets extremely wide to fill the whole screen space under 3D perspective
                    this.x = (Math.random() - 0.5) * 2500;
                    this.y = (Math.random() - 0.5) * 2500;
                    this.z = zInit !== null ? zInit : Math.random() * 1000 + 100;
                    
                    // Determine celestial body type: Terrestrial (Earth-like), Gas Giant (Jupiter-like with rings), or Star (Sun-like corona)
                    this.type = type !== null ? type : ['terrestrial', 'gas_giant', 'gas_giant', 'star'][Math.floor(Math.random() * 4)];
                    
                    if (this.type === 'star') {
                        this.baseRadius = Math.random() * 22 + 35; // Stars are larger
                        this.color = '#ffb4ab'; 
                        this.hasRing = false;
                    } else if (this.type === 'gas_giant') {
                        this.baseRadius = Math.random() * 25 + 24; 
                        this.color = ['#feb528', '#ff23e5', '#ffd7f0'][Math.floor(Math.random() * 3)];
                        this.hasRing = Math.random() > 0.35; 
                    } else {
                        // Terrestrial planet
                        this.baseRadius = Math.random() * 15 + 16; 
                        this.color = ['#00d4ff', '#ccff00', '#a8e8ff'][Math.floor(Math.random() * 3)];
                        this.hasRing = false;
                    }
                    
                    // Terrestrial continent shapes generator
                    this.continents = [];
                    if (this.type === 'terrestrial') {
                        const numContinents = Math.floor(Math.random() * 3) + 2;
                        for (let i = 0; i < numContinents; i++) {
                            this.continents.push({
                                ox: (Math.random() - 0.5) * 0.8,
                                oy: (Math.random() - 0.5) * 0.8,
                                r: Math.random() * 0.45 + 0.2,
                                col: ['#ccff00', '#feb528', '#859398'][Math.floor(Math.random() * 3)]
                            });
                        }
                    }

                    // Gas giant bands & red spot generator
                    this.stripes = [];
                    if (this.type === 'gas_giant') {
                        const numStripes = Math.floor(Math.random() * 3) + 3;
                        for (let i = 0; i < numStripes; i++) {
                            this.stripes.push({
                                yRatio: (Math.random() - 0.5) * 1.4,
                                heightRatio: Math.random() * 0.16 + 0.06,
                                col: Math.random() > 0.5 ? 'rgba(0, 0, 0, 0.15)' : 'rgba(255, 255, 255, 0.15)'
                            });
                        }
                        this.spotX = (Math.random() * 0.4 + 0.1) * (Math.random() > 0.5 ? 1 : -1);
                        this.spotY = (Math.random() - 0.5) * 0.4;
                        this.spotR = Math.random() * 0.16 + 0.1;
                    }

                    // Star flare rotation speed
                    this.starRot = Math.random() * Math.PI * 2;
                    this.starRotSpeed = (Math.random() - 0.5) * 0.004;
                }
                
                update() {
                    this.z -= flightSpeed;
                    
                    if (this.type === 'star') {
                        this.starRot += this.starRotSpeed;
                    }
                    
                    if (this.z < -this.baseRadius - 60) {
                        this.init(1000);
                    }
                }
                
                draw() {
                    if (this.z <= -this.baseRadius) return;
                    
                    const scale = focalLength / (focalLength + this.z);
                    const mouseOffsetX = mouseActive ? (currentMouseX - canvas.width / 2) * 0.35 : 0;
                    const mouseOffsetY = mouseActive ? (currentMouseY - canvas.height / 2) * 0.35 : 0;
                    
                    const screenX = (canvas.width / 2) + (this.x - mouseOffsetX) * scale;
                    const screenY = (canvas.height / 2) + (this.y - mouseOffsetY) * scale;
                    const r = this.baseRadius * scale;
                    
                    let alpha = 1.0;
                    if (this.z > 800) {
                        alpha = (1000 - this.z) / 200; 
                    } else if (this.z < 0) {
                        alpha = Math.max(0, (this.baseRadius + this.z) / this.baseRadius); 
                    }
                    
                    if (alpha <= 0) return;
                    
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = Math.max(1.2, 4.5 * scale);
                    
                    // --- 1. STAR TYPE DRAWING ---
                    if (this.type === 'star') {
                        ctx.save();
                        ctx.translate(screenX, screenY);
                        ctx.rotate(this.starRot);
                        
                        // Spikey sunburst corona rays
                        ctx.fillStyle = 'rgba(255, 172, 232, 0.16)'; 
                        ctx.beginPath();
                        const spikes = 8;
                        const outerR = r * 1.5;
                        const innerR = r * 0.9;
                        for (let i = 0; i < spikes * 2; i++) {
                            const angle = (i * Math.PI) / spikes;
                            const dist = i % 2 === 0 ? outerR : innerR;
                            ctx.lineTo(Math.cos(angle) * dist, Math.sin(angle) * dist);
                        }
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.restore();
                        
                        // Glow core ring
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, r * 1.25, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(255, 254, 181, 0.25)';
                        ctx.fill();
                        
                        // Center star sphere
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, r, 0, Math.PI * 2);
                        ctx.fillStyle = '#ffffff';
                        ctx.fill();
                        ctx.stroke();
                    }
                    
                    // --- 2. GAS GIANT DRAWING ---
                    else if (this.type === 'gas_giant') {
                        if (this.hasRing) {
                            ctx.beginPath();
                            ctx.ellipse(screenX, screenY, r * 1.9, r * 0.42, Math.PI / 6, Math.PI, 0); 
                            ctx.stroke();
                        }
                        
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, r, 0, Math.PI * 2);
                        ctx.clip();
                        
                        ctx.fillStyle = this.color;
                        ctx.fill();
                        
                        // Render horizontal bands
                        this.stripes.forEach(s => {
                            ctx.fillStyle = s.col;
                            const stripeY = screenY + s.yRatio * r;
                            const stripeH = s.heightRatio * r;
                            ctx.fillRect(screenX - r * 2, stripeY - stripeH / 2, r * 4, stripeH);
                        });
                        
                        // Red storm spot
                        ctx.beginPath();
                        ctx.arc(screenX + this.spotX * r, screenY + this.spotY * r, this.spotR * r, 0, Math.PI * 2);
                        ctx.fillStyle = '#ff23e5';
                        ctx.fill();
                        ctx.stroke();
                        
                        ctx.restore();
                        
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, r, 0, Math.PI * 2);
                        ctx.stroke();
                        
                        if (this.hasRing) {
                            ctx.beginPath();
                            ctx.ellipse(screenX, screenY, r * 1.9, r * 0.42, Math.PI / 6, 0, Math.PI); 
                            ctx.stroke();
                        }
                    }
                    
                    // --- 3. TERRESTRIAL PLANET DRAWING ---
                    else {
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, r, 0, Math.PI * 2);
                        ctx.clip();
                        
                        ctx.fillStyle = this.color;
                        ctx.fill();
                        
                        // Draw continental blobs
                        this.continents.forEach(c => {
                            ctx.fillStyle = c.col;
                            ctx.beginPath();
                            ctx.arc(screenX + c.ox * r, screenY + c.oy * r, c.r * r, 0, Math.PI * 2);
                            ctx.fill();
                        });
                        
                        ctx.restore();
                        
                        ctx.beginPath();
                        ctx.arc(screenX, screenY, r, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    
                    ctx.restore();
                }
            }
            
            class Particle3D {
                constructor() {
                    this.init();
                    this.z = Math.random() * 1000; 
                }
                
                init() {
                    // Spread particles extremely wide to avoid center-clustering under 3D projection
                    this.x = (Math.random() - 0.5) * 3500;
                    this.y = (Math.random() - 0.5) * 3500;
                    this.z = 1000;
                    this.size = Math.random() * 1.5 + 1.2;
                    this.hueOffset = Math.random() * 80 - 40; // Deviation from the shifting nebula hue
                    this.brightness = Math.random() * 20 + 62;
                }
                
                update() {
                    this.z -= flightSpeed;
                    
                    // Gentle orbital gravity pull from planets as they pass by
                    planets.forEach(target => {
                        if (Math.abs(this.z - target.z) < 150) {
                            const dx = target.x - this.x;
                            const dy = target.y - this.y;
                            const dist = Math.hypot(dx, dy) || 1;
                            if (dist < 260) {
                                const pull = 0.05 * (150 - Math.abs(this.z - target.z)) / 150;
                                this.x += (dx / dist) * pull * 3.5;
                                this.y += (dy / dist) * pull * 3.5;
                                this.x += (-dy / dist) * pull * 4.0;
                                this.y += (dx / dist) * pull * 4.0;
                            }
                        }
                    });
                    
                    if (this.z <= 0) {
                        this.init();
                    }
                }
                
                draw() {
                    const scale = focalLength / (focalLength + this.z);
                    const mouseOffsetX = mouseActive ? (currentMouseX - canvas.width / 2) * 0.35 : 0;
                    const mouseOffsetY = mouseActive ? (currentMouseY - canvas.height / 2) * 0.35 : 0;
                    
                    const screenX = (canvas.width / 2) + (this.x - mouseOffsetX) * scale;
                    const screenY = (canvas.height / 2) + (this.y - mouseOffsetY) * scale;
                    
                    if (screenX < -50 || screenX > canvas.width + 50 || screenY < -50 || screenY > canvas.height + 50) return;
                    
                    ctx.save();
                    
                    ctx.beginPath();
                    const particleHue = (currentNebulaHue1 + this.hueOffset + 360) % 360;
                    ctx.strokeStyle = `hsl(${particleHue}, 90%, ${this.brightness}%)`;
                    ctx.lineWidth = this.size * Math.max(0.5, scale);
                    ctx.lineCap = 'round';
                    
                    const speed = flightSpeed * scale;
                    const dx = screenX - canvas.width / 2;
                    const dy = screenY - canvas.height / 2;
                    const distToCenter = Math.hypot(dx, dy) || 1;
                    
                    const stretch = Math.max(speed * 1.8, 3.5);
                    ctx.moveTo(screenX, screenY);
                    ctx.lineTo(screenX - (dx / distToCenter) * stretch, screenY - (dy / distToCenter) * stretch);
                    ctx.stroke();
                    
                    ctx.restore();
                }
            }
            
            class ShootingStar {
                constructor() {
                    this.reset();
                }
                
                reset() {
                    this.x = Math.random() * canvas.width * 0.7;
                    this.y = -60;
                    this.vx = Math.random() * 6 + 6; 
                    this.vy = Math.random() * 6 + 6;
                    this.length = Math.random() * 80 + 70;
                    this.width = Math.random() * 2 + 1.6;
                    this.hue = Math.random() * 360;
                    this.active = true;
                    this.alpha = 1.0;
                    this.decay = Math.random() * 0.012 + 0.01;
                }
                
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha -= this.decay;
                    if (this.alpha <= 0 || this.x > canvas.width + 60 || this.y > canvas.height + 60) {
                        this.active = false;
                    }
                }
                
                draw() {
                    if (!this.active) return;
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    
                    const grad = ctx.createLinearGradient(
                        this.x, this.y, 
                        this.x - this.vx * (this.length / Math.hypot(this.vx, this.vy)), 
                        this.y - this.vy * (this.length / Math.hypot(this.vx, this.vy))
                    );
                    grad.addColorStop(0, `hsl(${this.hue}, 100%, 70%)`);
                    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    
                    ctx.beginPath();
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = this.width;
                    ctx.lineCap = 'round';
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(
                        this.x - this.vx * (this.length / Math.hypot(this.vx, this.vy)), 
                        this.y - this.vy * (this.length / Math.hypot(this.vx, this.vy))
                    );
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.width * 1.3, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.restore();
                }
            }
            
            class TrailParticle2D {
                constructor(x, y) {
                    const offsetX = (Math.random() - 0.5) * 35;
                    const offsetY = (Math.random() - 0.5) * 35;
                    this.x = x + offsetX;
                    this.y = y + offsetY;
                    
                    this.startX = this.x;
                    this.startY = this.y;
                    
                    this.size = Math.random() * 4 + 4; 
                    
                    trailHue = (trailHue + 1.2) % 360; 
                    this.color = `hsl(${trailHue}, 100%, 60%)`;
                    
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 1.5 + 0.6;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    
                    this.opacity = 1.0;
                    this.scale = 1.0;
                    this.active = true;
                }
                
                update() {
                    const dx = currentMouseX - this.x;
                    const dy = currentMouseY - this.y;
                    const dist = Math.hypot(dx, dy) || 1;
                    
                    const pull = 0.08;
                    this.vx += (dx / dist) * pull;
                    this.vy += (dy / dist) * pull;
                    
                    this.vx *= 0.94;
                    this.vy *= 0.94;
                    
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    this.opacity -= 0.016;
                    this.scale -= 0.012;
                    
                    if (this.opacity <= 0 || this.scale <= 0) {
                        this.active = false;
                    }
                }
                
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1.5;
                    
                    const currentSize = this.size * this.scale;
                    ctx.beginPath();
                    ctx.rect(this.x - currentSize / 2, this.y - currentSize / 2, currentSize, currentSize);
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                }
            }
            
            function initParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle3D());
                }
            }
            
            function initPlanets() {
                planets = [];
                for (let i = 0; i < planetCount; i++) {
                    // Stagger along Z axis for spacing
                    planets.push(new Planet3D(150 + i * 200)); 
                }
            }
            
            // Draw a slow-shifting diagonal cosmic nebula gradient as the Milky Way
            function drawMilkyWay() {
                ctx.save();
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                
                // Slightly faster shifting hue base over time (cycles in ~2.7 mins for visible transition)
                const time = Date.now() * 0.00015;
                currentNebulaHue1 = (time * 15) % 360;
                currentNebulaHue2 = (currentNebulaHue1 + 130) % 360;
                
                grad.addColorStop(0.0, 'rgba(14, 20, 23, 1)'); 
                grad.addColorStop(0.35, `hsla(${currentNebulaHue1}, 75%, 12%, 0.18)`); 
                grad.addColorStop(0.5, `hsla(${currentNebulaHue2}, 80%, 18%, 0.25)`); // Bright core of the galaxy
                grad.addColorStop(0.65, `hsla(${currentNebulaHue1}, 75%, 12%, 0.18)`);
                grad.addColorStop(1.0, 'rgba(14, 20, 23, 1)');
                
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }
            
            function animateParticles() {
                // Draw background nebula galaxy layer first
                drawMilkyWay();
                
                // 1. Draw Planets (approaching forward in straight line)
                planets.forEach(p => {
                    p.update();
                    p.draw();
                });
                
                // 2. Spawn and render Shooting Stars
                if (Math.random() < 0.006 && shootingStars.length < 2) {
                    shootingStars.push(new ShootingStar());
                }
                shootingStars = shootingStars.filter(s => s.active);
                shootingStars.forEach(s => {
                    s.update();
                    s.draw();
                });
                
                // 3. Draw 3D Space Dust particles (projecting forwards)
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                
                // 4. Draw and update 2D Rainbow Mouse Trail pixels (retained)
                trailParticles = trailParticles.filter(tp => tp.active);
                trailParticles.forEach(tp => {
                    tp.update();
                    tp.draw();
                });
                
                requestAnimationFrame(animateParticles);
            }
            
            window.addEventListener('resize', resizeCanvas);
            
            // Mouse track events
            document.addEventListener('mousemove', (e) => {
                currentMouseX = e.clientX;
                currentMouseY = e.clientY;
                mouseActive = true;
                
                if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                    const dist = Math.hypot(currentMouseX - lastMouseX, currentMouseY - lastMouseY);
                    if (dist > trailThreshold) {
                        for (let i = 0; i < 2; i++) {
                            trailParticles.push(new TrailParticle2D(currentMouseX, currentMouseY));
                        }
                        lastMouseX = currentMouseX;
                        lastMouseY = currentMouseY;
                    }
                }
            });
            
            document.addEventListener('mouseleave', () => {
                mouseActive = false;
            });
            
            document.addEventListener('mouseenter', (e) => {
                currentMouseX = e.clientX;
                currentMouseY = e.clientY;
                mouseActive = true;
            });
            
            // Run engine
            resizeCanvas();
            requestAnimationFrame(animateParticles);

            // Original Functionality
            const form = document.getElementById('task-form');
            const input = document.getElementById('task-input');
            const list = document.getElementById('task-list');
            const typingIndicator = document.getElementById('typing-indicator');

            // Input interactions
            input.addEventListener('input', () => {
                if (input.value.length > 0) {
                    typingIndicator.classList.remove('hidden');
                } else {
                    typingIndicator.classList.add('hidden');
                }
            });

            // Form Submit
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = input.value.trim();
                if (!text) return;

                const now = new Date();
                const dateStr = `${now.getFullYear()}. ${String(now.getMonth() + 1).padStart(2, '0')}. ${String(now.getDate()).padStart(2, '0')}. ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                // Create Task Element
                const taskEl = document.createElement('div');
                taskEl.className = 'bg-surface-variant border-4 border-black p-bouncy-padding neo-shadow-lg flex items-center justify-between gap-4 task-pop group transition-colors duration-300 has-[:checked]:bg-surface-container has-[:checked]:opacity-80';
                taskEl.innerHTML = `
                    <label class="checkbox-container flex items-center cursor-pointer relative">
                        <input type="checkbox" class="peer sr-only">
                        <div class="w-8 h-8 border-4 border-black bg-surface flex-shrink-0 flex items-center justify-center transition-colors">
                            <svg class="w-6 h-6 text-on-primary-container hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </label>
                    <div class="flex-grow flex flex-col gap-1 overflow-hidden">
                        <div class="flex items-center gap-3">
                            <span class="font-headline-md text-headline-md text-on-surface-variant transition-all cursor-pointer select-none truncate group-has-[:checked]:line-through group-has-[:checked]:opacity-50">${text}</span>
                            <span class="completed-badge hidden group-has-[:checked]:inline-block font-label-mono text-[14px] bg-[#ccff00] text-black px-2 py-1 border-2 border-black neo-shadow transform -rotate-2 whitespace-nowrap">완료됨</span>
                        </div>
                        <span class="font-label-mono text-[12px] text-outline">${dateStr}</span>
                    </div>
                    <button class="text-error bg-surface border-4 border-black w-12 h-12 flex items-center justify-center neo-shadow neo-button hover:bg-error-container delete-btn" aria-label="Delete task">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">delete</span>
                    </button>
                `;

                // Add to list top
                list.insertBefore(taskEl, list.firstChild);
                
                // Screen shake on add
                document.body.classList.remove('screen-shake');
                void document.body.offsetWidth; // trigger reflow
                document.body.classList.add('screen-shake');

                // Fireworks effect on submit button
                const btn = form.querySelector('button');
                const rect = btn.getBoundingClientRect();
                createFireworks(rect.left + rect.width / 2, rect.top + rect.height / 2);

                // Reset input
                input.value = '';
                typingIndicator.classList.add('hidden');
                input.focus();

                // Attach delete event to the new element
                taskEl.querySelector('.delete-btn').addEventListener('click', (e) => {
                    const t = e.currentTarget.closest('.task-pop');
                    t.style.animation = 'none';
                    t.style.transition = 'all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    t.style.transform = 'scale(0) rotate(10deg)';
                    t.style.opacity = '0';
                    setTimeout(() => t.remove(), 200);
                });
            });

            // Global click explosion and interaction feedback
            document.addEventListener('click', (e) => {
                if(e.target.closest('button') && !e.target.closest('form')) {
                    const x = e.clientX;
                    const y = e.clientY;
                    createExplosion(x, y, ['#ff23e5', '#a8e8ff', '#ffffff'], 5);
                } else if (e.target.closest('input[type="checkbox"]')) {
                    const x = e.clientX;
                    const y = e.clientY;
                    createExplosion(x, y, ['#ff23e5', '#a8e8ff', '#ffffff'], 5);
                }
                
                createGlobalBurst(e.clientX, e.clientY);
            });

            function createGlobalBurst(x, y) {
                if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                
                const colors = ['#ff23e5', '#ccff00', '#00d4ff', '#feb528']; // Pink, Lime, Blue, Yellow
                const shapes = ['rounded-full', 'rounded-none', 'rotate-45']; // Circle, Square, Diamond
                const particleCount = Math.floor(Math.random() * 4) + 5; // 5 to 8
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const shapeClass = shapes[Math.floor(Math.random() * shapes.length)];
                    const size = Math.random() * 20 + 15;
                    
                    particle.className = `fixed border-2 border-black neo-shadow ${shapeClass}`;
                    particle.style.backgroundColor = color;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.left = `${x - size/2}px`;
                    particle.style.top = `${y - size/2}px`;
                    particle.style.pointerEvents = 'none';
                    particle.style.zIndex = '9998';
                    
                    document.body.appendChild(particle);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = Math.random() * 12 + 6;
                    let vx = Math.cos(angle) * velocity;
                    let vy = Math.sin(angle) * velocity - 8;
                    let currentX = x - size/2;
                    let currentY = y - size/2;
                    let opacity = 1;
                    let rotation = 0;
                    const rotSpeed = (Math.random() - 0.5) * 15;
                    
                    function animate() {
                        vy += 0.5;
                        currentX += vx;
                        currentY += vy;
                        opacity -= 0.015;
                        rotation += rotSpeed;
                        
                        particle.style.transform = `translate(${currentX - (x - size/2)}px, ${currentY - (y - size/2)}px) rotate(${rotation}deg)`;
                        particle.style.opacity = opacity;
                        
                        if (opacity > 0) {
                            requestAnimationFrame(animate);
                        } else {
                            particle.remove();
                        }
                    }
                    
                    requestAnimationFrame(animate);
                }
            }

            function createExplosion(x, y, colors, count = 12) {
                if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                
                for (let i = 0; i < count; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'explosion-particle border-2 border-black bg-[' + colors[Math.floor(Math.random() * colors.length)] + ']';
                    
                    const shapes = ['rounded-full', 'rounded-none', 'rotate-45'];
                    particle.classList.add(shapes[Math.floor(Math.random() * shapes.length)]);
                    
                    const size = Math.random() * 16 + 8;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    
                    particle.style.left = `${x - size/2}px`;
                    particle.style.top = `${y - size/2}px`;

                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 100 + 50;
                    particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                    particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);

                    document.body.appendChild(particle);

                    setTimeout(() => particle.remove(), 600);
                }
            }
            
            function createFireworks(x, y) {
                if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                
                const colors = ['#ff00ff', '#ccff00', '#00d4ff'];
                const particleCount = 40;
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const size = Math.random() * 10 + 6;
                    const isCircle = Math.random() > 0.5;
                    
                    particle.style.position = 'fixed';
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.backgroundColor = color;
                    particle.style.border = '2px solid black';
                    if (isCircle) particle.style.borderRadius = '50%';
                    particle.style.pointerEvents = 'none';
                    particle.style.zIndex = '9999';
                    
                    document.body.appendChild(particle);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = Math.random() * 15 + 5;
                    let vx = Math.cos(angle) * velocity;
                    let vy = Math.sin(angle) * velocity - 8;
                    let currentX = x;
                    let currentY = y;
                    let opacity = 1;
                    
                    function animate() {
                        vy += 0.4;
                        currentX += vx;
                        currentY += vy;
                        opacity -= 0.015;
                        
                        particle.style.transform = `translate(${currentX - x}px, ${currentY - y}px)`;
                        particle.style.opacity = opacity;
                        
                        if (opacity > 0) {
                            requestAnimationFrame(animate);
                        } else {
                            particle.remove();
                        }
                    }
                    
                    requestAnimationFrame(animate);
                }
            }
            
            // Initial attach delete events to existing items
            document.querySelectorAll('.delete-btn').forEach(btn => {
                 btn.addEventListener('click', (e) => {
                    const t = e.currentTarget.closest('.task-pop');
                    t.style.animation = 'none';
                    t.style.transition = 'all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    t.style.transform = 'scale(0) rotate(10deg)';
                    t.style.opacity = '0';
                    setTimeout(() => t.remove(), 200);
                });
            });
        });
    </script>
</body>
</html>
