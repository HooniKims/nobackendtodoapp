<style>
        .material-symbols-outlined {

        /* Neobrutalist specific styles */
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            overflow-x: hidden;
        }

        .neo-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }

        .neo-shadow-lg {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }

        .neo-button {
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.1s;
        }

        .neo-button:active {
            transform: translate(4px, 4px) !important;
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1) !important;
        }

        .neo-button:hover {
            transform: scale(1.05) translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
        }

        .task-pop {
            animation: taskPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform-origin: center;
        }

        @media (prefers-reduced-motion: reduce) {
            .task-pop {
                animation: none;
            }
            .screen-shake {
                animation: none;
            }
            .wiggle {
                animation: none;
            }
            .bg-shape-inner {
                animation: none !important;
            }
        }

        @keyframes taskPop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .wiggle {
            animation: wiggle 2s linear infinite;
        }

        @keyframes wiggle {
            0%, 7% { transform: rotateZ(0); }
            15% { transform: rotateZ(-5deg); }
            20% { transform: rotateZ(3deg); }
            25% { transform: rotateZ(-5deg); }
            30% { transform: rotateZ(2deg); }
            35%, 100% { transform: rotateZ(0); }
        }

        .screen-shake {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .checkbox-container input:checked + div {
            background-color: theme('colors.primary-container');
            animation: taskPop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .checkbox-container input:checked + div svg {
            display: block;
        }

        .explosion-particle {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            animation: explode 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes explode {
            0% { transform: scale(1) translate(0, 0); opacity: 1; }
            100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        /* Background Shapes Animation */
        @keyframes floatBg {
            0% { transform: translateY(0) rotate(var(--rot-start)); }
            50% { transform: translateY(calc(var(--float-dist) * -1)) rotate(var(--rot-mid)); }
            100% { transform: translateY(0) rotate(var(--rot-end)); }
        }
        .bg-shape-inner {
            animation: floatBg var(--float-dur) ease-in-out infinite;

                // Random starting position
                wrapper.style.left = `${Math.random() * 100}vw`;
                wrapper.style.top = `${Math.random() * 100}vh`;
                
                // Random parallax intensity
                const parallaxFactor = (Math.random() * 0.05) + 0.01;
                parallaxElements.push({ el: wrapper, factor: parallaxFactor });

                const inner = document.createElement('div');
                const color = bgColors[Math.floor(Math.random() * bgColors.length)];
                const shape = bgShapes[Math.floor(Math.random() * bgShapes.length)];
                const size = Math.floor(Math.random() * 60) + 40; // 40px to 100px
                
                inner.className = `bg-shape-inner border-[4px] border-black opacity-40 neo-shadow-lg ${color} ${shape}`;
                inner.style.width = `${size}px`;
                inner.style.height = `${size}px`;
                
                // Setup animation variables
                const rotStart = Math.floor(Math.random() * 360);
                inner.style.setProperty('--rot-start', `${rotStart}deg`);
                inner.style.setProperty('--rot-mid', `${rotStart + (Math.random() > 0.5 ? 90 : -90)}deg`);
                inner.style.setProperty('--rot-end', `${rotStart + (Math.random() > 0.5 ? 180 : -180)}deg`);
                inner.style.setProperty('--float-dist', `${Math.floor(Math.random() * 150) + 50}px`);
                inner.style.setProperty('--float-dur', `${Math.floor(Math.random() * 20) + 15}s`);
                
                wrapper.appendChild(inner);
                bgContainer.appendChild(wrapper);
            }

            // Mouse tracking for parallax
            document.addEventListener('mousemove', (e) => {
                if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                
                const deltaX = mouseX - centerX;
                const deltaY = mouseY - centerY;

                parallaxElements.forEach(item => {
                    const moveX = deltaX * item.factor;
                    const moveY = deltaY * item.factor;
                    item.el.style.transform = `translate(${moveX}px, ${moveY}px)`;
                });
            });


            // Original Functionality
            const form = document.getElementById('task-form');
            const input = document.getElementById('task-input');
            const list = document.getElementById('task-list');
            const typingIndicator = document.getElementById('typing-indicator');

            // Input interactions
            input.addEventListener('input', () => {
                if (input.value.length > 0) {
                    typingIndicator.classList.remove('hidden');
                } else {
                    typingIndicator.classList.add('hidden');
                }
            });

            // Form Submit
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = input.value.trim();
                if (!text) return;

                const now = new Date();
                const dateStr = `${now.getFullYear()}. ${String(now.getMonth() + 1).padStart(2, '0')}. ${String(now.getDate()).padStart(2, '0')}. ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                // Create Task Element
                const taskEl = document.createElement('div');
                taskEl.className = 'bg-surface-variant border-4 border-black p-bouncy-padding neo-shadow-lg flex items-center justify-between gap-4 task-pop group transition-colors duration-300 has-[:checked]:bg-surface-container has-[:checked]:opacity-80';
                taskEl.innerHTML = `
                    <label class="checkbox-container flex items-center cursor-pointer relative">
                        <input type="checkbox" class="peer sr-only">
                        <div class="w-8 h-8 border-4 border-black bg-surface flex-shrink-0 flex items-center justify-center transition-colors">
                            <svg class="w-6 h-6 text-on-primary-container hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </label>
                    <div class="flex-grow flex flex-col gap-1 overflow-hidden">
                        <div class="flex items-center gap-3">
                            <span class="font-headline-md text-headline-md text-on-surface-variant transition-all cursor-pointer select-none truncate group-has-[:checked]:line-through group-has-[:checked]:opacity-50">${text}</span>
                            <span class="completed-badge hidden group-has-[:checked]:inline-block font-label-mono text-[14px] bg-[#ccff00] text-black px-2 py-1 border-2 border-black neo-shadow transform -rotate-2 whitespace-nowrap">완료됨</span>
                        </div>
                        <span class="font-label-mono text-[12px] text-outline">${dateStr}</span>
                    </div>
                    <button class="text-error bg-surface border-4 border-black w-12 h-12 flex items-center justify-center neo-shadow neo-button hover:bg-error-container delete-btn" aria-label="Delete task">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">delete</span>
                    </button>
                `;

                // Add to list top
                list.insertBefore(taskEl, list.firstChild);
                
                // Screen shake on add
                document.body.classList.remove('screen-shake');
                void document.body.offsetWidth; // trigger reflow
                document.body.classList.add('screen-shake');

                // Fireworks effect on submit button
                const btn = form.querySelector('button');
                const rect = btn.getBoundingClientRect();
                createFireworks(rect.left + rect.width / 2, rect.top + rect.height / 2);

                // Reset input
                input.value = '';
                typingIndicator.classList.add('hidden');
                input.focus();

                // Attach delete event
                taskEl.querySelector('.delete-btn').addEventListener('click', (e) => {
                    const t = e.currentTarget.closest('.task-pop');
                    t.style.animation = 'none';
                    t.style.transition = 'all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    t.style.transform = 'scale(0) rotate(10deg)';
                    t.style.opacity = '0';
                    setTimeout(() => t.remove(), 200);
                });
            });

            // Global click explosion and interaction feedback
            document.addEventListener('click', (e) => {
                // Determine if it's a structural click
                if(e.target.closest('button') && !e.target.closest('form')) {
                    const rect = e.target.getBoundingClientRect();
                    const x = e.clientX;
                    const y = e.clientY;
                    
                    // Small local explosion
                    createExplosion(x, y, ['#ff23e5', '#a8e8ff', '#ffffff'], 5);
                } else if (e.target.closest('input[type="checkbox"]')) {
                    const rect = e.target.getBoundingClientRect();
                    const x = e.clientX;
                    const y = e.clientY;
                    
                    // Small local explosion
                    createExplosion(x, y, ['#ff23e5', '#a8e8ff', '#ffffff'], 5);
                }
                
                // Global click burst
                createGlobalBurst(e.clientX, e.clientY);
            });

            function createGlobalBurst(x, y) {
                if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                
                const colors = ['#ff23e5', '#ccff00', '#00d4ff', '#feb528']; // Pink, Lime, Blue, Yellow
                const shapes = ['rounded-full', 'rounded-none', 'rotate-45']; // Circle, Square, Diamond
                const particleCount = Math.floor(Math.random() * 4) + 5; // 5 to 8
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const shapeClass = shapes[Math.floor(Math.random() * shapes.length)];
                    const size = Math.random() * 20 + 15;
                    
                    particle.className = `fixed border-2 border-black neo-shadow ${shapeClass}`;
                    particle.style.backgroundColor = color;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.left = `${x - size/2}px`;
                    particle.style.top = `${y - size/2}px`;
                    particle.style.pointerEvents = 'none';
                    particle.style.zIndex = '9998';
                    
                    document.body.appendChild(particle);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = Math.random() * 12 + 6;
                    let vx = Math.cos(angle) * velocity;
                    let vy = Math.sin(angle) * velocity - 8; // initial upward kick
                    let currentX = x - size/2;
                    let currentY = y - size/2;
                    let opacity = 1;
                    let rotation = 0;
                    const rotSpeed = (Math.random() - 0.5) * 15;
                    
                    function animate() {
                        vy += 0.5; // gravity
                        currentX += vx;
                        currentY += vy;
                        opacity -= 0.015;
                        rotation += rotSpeed;
                        
                        particle.style.transform = `translate(${currentX - (x - size/2)}px, ${currentY - (y - size/2)}px) rotate(${rotation}deg)`;
                        particle.style.opacity = opacity;
                        
                        if (opacity > 0) {
                            requestAnimationFrame(animate);
                        } else {
                            particle.remove();
                        }
                    }
                    
                    requestAnimationFrame(animate);
                }
            }

            function createExplosion(x, y, colors, count = 12) {
                if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                
                for (let i = 0; i < count; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'explosion-particle border-2 border-black bg-[' + colors[Math.floor(Math.random() * colors.length)] + ']';
                    
                    // Random shapes
                    const shapes = ['rounded-full', 'rounded-none', 'rotate-45'];
                    particle.classList.add(shapes[Math.floor(Math.random() * shapes.length)]);
                    
                    // Random size
                    const size = Math.random() * 16 + 8;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    
                    // Position
                    particle.style.left = `${x - size/2}px`;
                    particle.style.top = `${y - size/2}px`;

                    // Random trajectory
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 100 + 50;
                    particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                    particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);

                    document.body.appendChild(particle);

                    // Cleanup
                    setTimeout(() => particle.remove(), 600);
                }
            }
            
            function createFireworks(x, y) {
                if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                
                const colors = ['#ff00ff', '#ccff00', '#00d4ff']; // Neon Pink, Cyber Lime, Electric Blue
                const particleCount = 40;
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const size = Math.random() * 10 + 6;
                    const isCircle = Math.random() > 0.5;
                    
                    particle.style.position = 'fixed';
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.backgroundColor = color;
                    particle.style.border = '2px solid black';
                    if (isCircle) particle.style.borderRadius = '50%';
                    particle.style.pointerEvents = 'none';
                    particle.style.zIndex = '9999';
                    
                    document.body.appendChild(particle);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = Math.random() * 15 + 5;
                    let vx = Math.cos(angle) * velocity;
                    let vy = Math.sin(angle) * velocity - 8; // initial upward burst
                    let currentX = x;
                    let currentY = y;
                    let opacity = 1;
                    
                    function animate() {
                        vy += 0.4; // gravity
                        currentX += vx;
                        currentY += vy;
                        opacity -= 0.015;
                        
                        particle.style.transform = `translate(${currentX - x}px, ${currentY - y}px)`;
                        particle.style.opacity = opacity;
                        
                        if (opacity > 0) {
                            requestAnimationFrame(animate);
                        } else {
                            particle.remove();
                        }
                    }
                    
                    requestAnimationFrame(animate);
                }
            }
            
            // Initial attach delete events to existing items
            document.querySelectorAll('.delete-btn').forEach(btn => {
                 btn.addEventListener('click', (e) => {
                    const t = e.currentTarget.closest('.task-pop');
                    t.style.animation = 'none';
                    t.style.transition = 'all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    t.style.transform = 'scale(0) rotate(10deg)';
                    t.style.opacity = '0';
                    setTimeout(() => t.remove(), 200);
                });
            });
        });
    </script>
</body></html>
